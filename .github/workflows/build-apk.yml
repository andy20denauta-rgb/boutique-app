name: Build Signed APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          mkdir android-build && cd android-build
          npx @bubblewrap/cli init \
            --manifest "${{ secrets.APP_URL }}/manifest.json" \
            --directory . \
            --skipPwaValidation

      - name: Build APK with Bubblewrap
        run: |
          cd android-build
          npx @bubblewrap/cli build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: boutique-apk
          path: android-build/app-release-signed.apk